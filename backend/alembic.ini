# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with current dir
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to generate for "slug"
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autocommit
# revision_environment = false

# set to 'true' to allow Alembic to search for writing
# revision scripts in multiple directories
# version_locations = %(here)s/bar:%(here)s/bat:version_locations

# version table name
# version_table = alembic_version

# version table schema
# version_table_schema =

# version table pk
# version_table_pk =

# set to 'true' to write empty revisions
# write_empty = false

sqlalchemy.url = postgresql+asyncpg://humanity:humanity_password@localhost:5432/humanityos

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# immediately after a new migration script is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
