version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: humanityos_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-humanity_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-humanity_prod_password_must_change}
      POSTGRES_DB: ${POSTGRES_DB:-humanityos_prod}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: humanityos_redis_prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chromadb:
    image: chromadb/chroma:latest
    container_name: humanityos_chromadb_prod
    restart: always
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/data
    ports:
      - "8001:8000"
    volumes:
      - chromadata_prod:/chroma/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: humanityos_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-humanity_prod}:${POSTGRES_PASSWORD:-humanity_prod_password_must_change}@postgres:5432/${POSTGRES_DB:-humanityos_prod}
      - REDIS_URL=redis://redis:6379/0
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000
      - PORT=8080
      - ENV=production
      - DEBUG=False
      - LOG_LEVEL=INFO
      - STRUCTURED_LOGGING=true
      - SECRET_KEY=${SECRET_KEY:-prod_fallback_secret_key_change_me_now}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-humanityos-prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2048M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: humanityos_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata_prod:
    driver: local
  redisdata_prod:
    driver: local
  chromadata_prod:
    driver: local
