name: HumanityOS CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  test-and-typecheck:
    name: Test and Validate Codebase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend Checks
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx python-jose[cryptography]

      - name: Run Backend Pytest Suite
        env:
          ENV: development
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          REDIS_URL: redis://localhost:6379/0
          CHROMADB_HOST: localhost
          CHROMADB_PORT: 8000
        run: |
          cd backend
          python -m pytest

      # Frontend Checks
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Typecheck
        run: |
          cd frontend
          npm run typecheck

  deploy-to-gcp:
    name: Build & Deploy to Cloud Run / Firebase
    needs: test-and-typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Authenticate to Google Cloud Platform
      # Supports Service Account Key secret or Workload Identity Federation
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 2. Build and Push Backend Container Image
      - name: Build & Push Backend Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/humanityos/backend:${{ github.sha }} -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/humanityos/backend:latest ./backend
          docker push --all-tags us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/humanityos/backend

      # 3. Deploy Backend to Google Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: humanityos-backend
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/humanityos/backend:${{ github.sha }}
          region: us-central1
          flags: |
            --allow-unauthenticated
            --platform=managed
            --set-env-vars=ENV=production,STRUCTURED_LOGGING=true,DEBUG=False

      # 4. Build Frontend Assets
      - name: Setup Node.js (Build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          cd frontend
          npm ci
          npm run build

      # 5. Deploy Frontend to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HUMANITYOS_PROD }}
          projectId: humanityos-prod
          channelId: live
